name: SurveyRecorder
options:
  bundleIdPrefix: com.flowfit.indoorpositioning
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

schemes:
  SurveyRecorder:
    build:
      targets:
        SurveyRecorder: all
  FilterParityTests:
    build:
      targets:
        FilterParityTests: all
    test:
      targets:
        - FilterParityTests

targets:
  # JS<->Swift filter parity (macOS so it runs without a simulator; the filter
  # sources are pure Foundation). Regenerate fixtures with
  # analysis/make-parity-fixture.js whenever filter math changes on either side.
  FilterParityTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: SurveyRecorder/RouteBeliefFilter.swift
      - path: SurveyRecorder/RouteProfile.swift
      - path: SurveyRecorder/ParticleFilter2D.swift
      - path: SurveyRecorder/TwoDMapModels.swift
      - path: SurveyRecorder/TwoDSurveyModels.swift
      - path: Tests/FilterParityTests.swift
      - path: Tests/ParticleFilter2DTests.swift
      - path: Tests/Fixtures
        buildPhase: resources
    settings:
      base:
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true

  SurveyRecorder:
    type: application
    platform: iOS
    sources:
      - SurveyRecorder
    info:
      path: SurveyRecorder/Info.plist
      properties:
        CFBundleDisplayName: Survey Recorder
        UILaunchScreen: {}
        NSMotionUsageDescription: Step, motion, and barometer data are recorded during route surveys to build indoor positioning fingerprints.
        NSCameraUsageDescription: The camera is used only during surveyor ground-truth recording (ARKit) to log a precise walking trajectory. It is never used in the tour experience.
        NSMicrophoneUsageDescription: The microphone is used to record optional audio clips for map checkpoints.
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - magnetometer
          - accelerometer
          - gyroscope
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 338HW8LR87
        GENERATE_INFOPLIST_FILE: false
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
