name: SurveyRecorder
options:
  bundleIdPrefix: com.headout.indoorpositioning
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  SurveyRecorder:
    type: application
    platform: iOS
    sources:
      - SurveyRecorder
    info:
      path: SurveyRecorder/Info.plist
      properties:
        CFBundleDisplayName: Survey Recorder
        UILaunchScreen: {}
        NSMotionUsageDescription: Step, motion, and barometer data are recorded during route surveys to build indoor positioning fingerprints.
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - magnetometer
          - accelerometer
          - gyroscope
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: false
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
